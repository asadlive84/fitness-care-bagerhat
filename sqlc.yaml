version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries"
    schema:  "migrations"
    gen:
      go:
        package: "sqlcdb"
        out:     "internal/database/sqlc"

        emit_json_tags:         true
        emit_interface:         true   # generates Querier interface
        emit_exact_table_names: false

        overrides:
          # UUID → google/uuid.UUID
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          # TIMESTAMPTZ → time.Time
          - db_type: "timestamptz"
            go_type: "time.Time"

          # DATE → time.Time (time component is zero)
          - db_type: "date"
            go_type: "time.Time"

          # JSONB → json.RawMessage (pass-through; service layer parses)
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"

          # NUMERIC (non-nullable) → float64
          - db_type: "pg_catalog.numeric"
            go_type: "float64"

          # NUMERIC (nullable) → sql.NullFloat64
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullFloat64"
