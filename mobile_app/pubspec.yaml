name: fitness_care_bagerhat
description: "Fitness Care Bagerhat — Gym Management Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.8.1
  url_launcher: ^6.3.0

  # HTTP
  dio: ^5.7.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Local preferences
  shared_preferences: ^2.3.3

  # Charts
  fl_chart: ^0.68.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Lottie animations
  lottie: ^3.1.3

  # Pull-to-refresh
  custom_refresh_indicator: ^4.0.1

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  phosphor_flutter: ^2.1.0

  # Firebase messaging
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Cached images
  cached_network_image: ^3.4.1

  # Internationalization
  intl: ^0.20.2

  # Environment
  flutter_dotenv: ^5.2.1

  # Reactive extensions
  rxdart: ^0.28.0

  cupertino_icons: ^1.0.8
  pdf: ^3.12.0
  printing: ^5.14.3
  image_picker: ^1.2.2
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

  # Linting
  very_good_analysis: ^6.0.0

  # Mocking
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/images/
    - .env
