name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION:     ap-southeast-1
  ECR_REGISTRY:   ${{ secrets.ECR_REGISTRY }}
  IMAGE_APP:      ${{ secrets.ECR_REGISTRY }}/fitnesscare-app
  IMAGE_FRONT:    ${{ secrets.ECR_REGISTRY }}/fitnesscare-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ───────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-1

      # ── 3. Login to Amazon ECR ─────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push API image ─────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_APP }}:latest
            ${{ env.IMAGE_APP }}:${{ github.sha }}

      # ── 5. Build & push Frontend image ────────────────────────────────────
      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.IMAGE_FRONT }}:latest
            ${{ env.IMAGE_FRONT }}:${{ github.sha }}

      # ── 6. Deploy on EC2 ──────────────────────────────────────────────────
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/fitnesscare

            # Pull latest .env from S3
            aws s3 cp s3://${{ secrets.S3_CONFIG_BUCKET }}/.env .env

            # Login to ECR
            aws ecr get-login-password --region ap-southeast-1 | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pull latest images
            docker pull ${{ env.IMAGE_APP }}:latest
            docker pull ${{ env.IMAGE_FRONT }}:latest

            # Restart stack
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f
