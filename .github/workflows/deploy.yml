name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ───────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Login to Amazon ECR ─────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push API image ─────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fitnesscare-app:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fitnesscare-app:${{ github.sha }}

      # ── 5. Build & push Frontend image ────────────────────────────────────
      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.SERVER_IP }}:9000
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fitnesscare-frontend:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fitnesscare-frontend:${{ github.sha }}

      # ── 6. Deploy on EC2 ──────────────────────────────────────────────────
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_IP }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

            # Write .env from GitHub Secrets (no S3 needed)
            cat > ~/fitnesscare/.env <<'ENVEOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            SUPERADMIN_EMAIL=${{ secrets.SEED_USER_EMAIL }}
            SUPERADMIN_PASSWORD=${{ secrets.SEED_USER_PASSWORD }}
            ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            CORS_ALLOWED_ORIGINS=http://${{ secrets.SERVER_IP }}
            ENVEOF

            # Pull latest migrations from repo
            cd ~/fitnesscare
            git pull origin main

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}

            # Pull latest images
            docker pull ${ECR_REGISTRY}/fitnesscare-app:latest
            docker pull ${ECR_REGISTRY}/fitnesscare-frontend:latest

            # Restart stack
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f
