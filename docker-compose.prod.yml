version: "3.9"

# Production compose — uses pre-built images from AWS ECR.
# On EC2: docker compose -f docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:15-alpine
    container_name: fitnesscare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     gym
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       fitnesscare
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U gym -d fitnesscare"]
      interval: 5s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7-alpine
    container_name: fitnesscare_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout:  5s
      retries:  10

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: fitnesscare_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://gym:${DB_PASSWORD}@postgres:5432/fitnesscare?sslmode=disable"
      - "up"
    restart: on-failure

  app:
    image: ${ECR_REGISTRY}/fitnesscare-app:latest
    container_name: fitnesscare_app
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV:             production
      DATABASE_DSN:        postgres://gym:${DB_PASSWORD}@postgres:5432/fitnesscare?sslmode=disable
      REDIS_ADDR:          redis:6379
      REDIS_PASSWORD:      ${REDIS_PASSWORD}
      SUPERADMIN_EMAIL:    ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    image: ${ECR_REGISTRY}/fitnesscare-frontend:latest
    container_name: fitnesscare_frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
